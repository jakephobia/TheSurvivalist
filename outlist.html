  <!-- MAIN AREA -->
  <div class="main-content">
    <header class="main-header">
      <div class="header-left">
        <h2 class="header-title">OUTLIST</h2>
        <p class="header-subtitle">Seasons ranking tool</p>
      </div>
      <div class="header-right">
        <button type="button" class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">☰</button>
        <button class="btn-secondary btn-sm" id="exportJsonBtn">Save Session</button>
        <button class="btn-secondary btn-sm" id="importJsonBtn">Load Session</button>
        <input type="file" id="jsonFile" accept=".json" class="hidden">
        <button type="button" class="btn-danger btn-secondary btn-sm" id="outlist-reset">Reset</button>
      </div>
    </header>

    <main class="dashboard-container">
      <section class="dashboard">
        <div class="outlist-top-row">
          <div class="outlist-stats">
            <div class="outlist-stat-card">
              <div class="outlist-stat-number" id="watchedStat">0/0</div>
              <div class="outlist-stat-label">Seasons Added</div>
            </div>
            <div class="outlist-stat-card">
              <div class="outlist-stat-number success" id="ratedStat">0/0</div>
              <div class="outlist-stat-label">Fully Rated</div>
            </div>
          </div>
          <button class="btn-secondary btn-sm" id="toggleAdvanced">Advanced Settings</button>
        </div>

        <div id="advancedSettings" class="outlist-settings hidden">
          <div class="outlist-settings-header">
            <h3>Advanced Settings</h3>
          </div>

          <div class="outlist-weights-section">
            <label class="outlist-checkbox-label">
              <input type="checkbox" id="useCustomWeights"> Customize Category Weights
            </label>
            <div id="weightsContainer" class="hidden">
              <div class="outlist-weights-grid" id="weightsGrid"></div>
              <p class="outlist-weights-note">Calculated proportionally to 100%.</p>
            </div>
          </div>
        </div>

        <button class="btn-secondary btn-block" id="addSeasonBtn">➕ Add New Season to List</button>

        <div id="alertContainer"></div>
        <div id="seasonsList"></div>

        <button class="btn-primary btn-block" id="calculateRankingBtn">📊 Calculate Final Ranking</button>

        <div id="exportSection" class="outlist-export-section hidden">
          <div class="outlist-export-header">
            <h2>🏆 Rankings</h2>
            <select id="sortOrder" class="outlist-sort-select">
              <option value="desc">Score: High to Low</option>
              <option value="asc">Score: Low to High</option>
            </select>
          </div>
          <textarea id="exportText" class="outlist-export-textarea" readonly></textarea>
          <div class="outlist-export-btns">
            <button class="btn-primary btn-block" id="copyBtn">📋 Copy Ranking to Clipboard</button>
            <button class="btn-secondary btn-block" id="exportRankingsBtn">Export Rankings</button>
          </div>
        </div>

      </section>
    </main>
  </div>

  <!-- SEASON MODAL -->
  <div id="seasonModal" class="outlist-modal-overlay">
    <div class="outlist-modal-content">
      <h3>Select Seasons</h3>
      <input type="text" id="modalSearch" placeholder="e.g. Filter seasons..." class="outlist-modal-search">
      <div id="seasonOptions" class="outlist-season-options"></div>
      <div class="outlist-modal-actions">
        <button class="btn-primary" id="confirmAddBtn">Add Selected</button>
        <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="dashboard-utils.js"></script>
